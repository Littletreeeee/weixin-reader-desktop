<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信读书阅读器</title>
    <style>
        :root { --bg: #f5f5f5; --text: #333; --accent: #4a90e2; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --text: #a1a1a1; } }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               height: 100vh; margin: 0; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        .status { font-size: 15px; opacity: 0.7; margin-bottom: 24px; }
        .btn { padding: 10px 28px; background: var(--accent); color: white; border: none;
               border-radius: 8px; font-size: 14px; cursor: pointer; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="icon">📚</div>
    <div class="status" id="status">网络未连接</div>
    <button class="btn" onclick="tryConnect()">重新连接</button>
    <script>
        async function tryConnect() {
            document.getElementById('status').textContent = '正在连接...';
            try {
                const c = new AbortController();
                setTimeout(() => c.abort(), 3000);
                await fetch('https://weread.qq.com', { mode: 'no-cors', signal: c.signal });
                window.location.href = 'https://weread.qq.com';
            } catch(e) {
                document.getElementById('status').textContent = '网络未连接';
            }
        }
        window.addEventListener('online', tryConnect);
        tryConnect();
    </script>
</body>
</html>
