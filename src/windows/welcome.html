<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>欢迎使用艾特阅读</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #202124;
      --text-secondary: #5f6368;
      --border-color: #e0e0e0;
      --primary-color: #1a73e8;
      --primary-hover: #1557b0;
      --secondary-bg: #f1f3f4;
      --secondary-hover: #e8eaed;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #202124;
        --card-bg: #292a2d;
        --text-color: #e8eaed;
        --text-secondary: #9aa0a6;
        --border-color: #3c4043;
        --primary-color: #8ab4f8;
        --primary-hover: #aecbfa;
        --secondary-bg: #3c4043;
        --secondary-hover: #4a4b4f;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .welcome-container {
      text-align: center;
      max-width: 480px;
      padding: 48px;
      background-color: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 16px;
    }

    .logo-placeholder {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--primary-color), #7c4dff);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-color);
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: var(--secondary-bg);
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: var(--secondary-hover);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      margin-right: 8px;
    }

    .tips {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .tips-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .tips-list {
      list-style: none;
      text-align: left;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .tips-list li::before {
      content: "•";
      margin-right: 8px;
      color: var(--primary-color);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background-color: var(--secondary-bg);
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #fbbc04;
      margin-right: 6px;
    }
  </style>
</head>

<body>
  <div class="welcome-container">
    <div class="logo-placeholder">@</div>
    
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>当前无可用插件</span>
    </div>
    
    <h1>欢迎使用艾特阅读</h1>
    <p class="subtitle">
      您尚未启用任何阅读插件。<br>
      请前往插件管理页面安装或启用插件以开始阅读。
    </p>
    
    <div class="button-group">
      <button class="btn btn-primary" id="openSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        打开插件管理
      </button>
      
      <button class="btn btn-secondary" id="learnMore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
        了解更多
      </button>
    </div>
    
    <div class="tips">
      <div class="tips-title">快速上手</div>
      <ul class="tips-list">
        <li>安装插件后，应用将自动加载对应的阅读源</li>
        <li>内置插件可以卸载后重新安装</li>
        <li>支持导入 .atrd 格式的第三方插件</li>
      </ul>
    </div>
  </div>

  <script type="module">
    import { WebviewWindow } from '@tauri-apps/api/webviewWindow';
    import { listen } from '@tauri-apps/api/event';
    import { invoke } from '@tauri-apps/api/core';
    
    // 打开插件管理（设置页面）
    document.getElementById('openSettings').addEventListener('click', async () => {
      try {
        // 尝试聚焦已存在的设置窗口
        const settingsWindow = await WebviewWindow.getByLabel('settings');
        if (settingsWindow) {
          await settingsWindow.setFocus();
          return;
        }
      } catch (e) {
        // 窗口不存在，创建新窗口
      }
      
      new WebviewWindow('settings', {
        url: 'settings.html',
        title: '设置',
        width: 720,
        height: 600,
        center: true,
        resizable: true,
        decorations: true,
      });
    });
    
    // 了解更多
    document.getElementById('learnMore').addEventListener('click', async () => {
      try {
        await invoke('open_url', { url: 'https://github.com/dengcb/weixin-reader-desktop' });
      } catch (e) {
        // 如果 open_url 命令不存在，尝试使用 opener 插件
        const { open } = await import('@tauri-apps/plugin-opener');
        await open('https://github.com/dengcb/weixin-reader-desktop');
      }
    });
    
    // 监听插件更新事件，当有插件启用时自动跳转
    listen('plugins-updated', async () => {
      // 检查是否有插件启用
      const settings = await invoke('get_settings');
      const enabledPlugins = settings?.global?.enabledPlugins;
      
      // 如果 undefined（全部启用）或有启用的插件，则跳转到主页
      if (enabledPlugins === undefined || (Array.isArray(enabledPlugins) && enabledPlugins.length > 0)) {
        // 关闭欢迎页面，主窗口会自动导航
        const currentWindow = WebviewWindow.getCurrent();
        await currentWindow.close();
      }
    });
  </script>
</body>

</html>
